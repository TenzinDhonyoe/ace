name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - name: Bundle size check
        run: |
          # Bundle the full ace-study-components entry point and report size.
          # Target: ~15KB gzipped (~32KB raw). Fail past 32KB raw so regressions
          # land loudly. Current baseline is ~30KB raw / ~10.6KB gzipped.
          bun build packages/ace-components/index.js --outfile /tmp/ace.js --minify
          SIZE=$(wc -c < /tmp/ace.js)
          echo "Bundle size: $SIZE bytes"
          if [ $SIZE -gt 32768 ]; then
            echo "ERROR: bundle exceeded 32KB raw ceiling ($SIZE bytes)"
            exit 1
          fi
