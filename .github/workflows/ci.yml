name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Validate all widget examples against their schemas
        run: bun test packages/ace-components/test/registry.test.js

  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - name: Bundle size check
        run: |
          # Bundle the full ace-study-components entry point and report size.
          # Budget: 25KB raw (~10KB gzipped). Fail if it balloons past 40KB raw.
          bun build packages/ace-components/index.js --outfile /tmp/ace.js --minify
          SIZE=$(wc -c < /tmp/ace.js)
          echo "Bundle size: $SIZE bytes"
          if [ $SIZE -gt 40960 ]; then
            echo "ERROR: bundle exceeded 40KB raw budget"
            exit 1
          fi
